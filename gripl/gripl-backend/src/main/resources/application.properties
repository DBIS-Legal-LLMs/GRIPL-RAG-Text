spring.config.import=optional:file:.env[.properties],optional:classpath:.env[.properties]

spring.application.name=gripl-backend
server.port=8080

llm.api-key=${OPENAI_API_KEY}

management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.frontend.base-url=${FRONTEND_BASE_URL}

# RAG Service configuration
rag.api.url=${RAG_API_URL}

# SpringDoc — tell Swagger UI to fetch the spec via the /api Traefik path so
# the reverse-proxy prefix is included and Traefik routes it to us correctly.
springdoc.swagger-ui.url=/api/v3/api-docs